<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Tunnel icon: two nodes connected by a curved tunnel -->
  <g transform="translate(15, 10)">
    <!-- Left node -->
    <circle cx="20" cy="40" r="6" fill="url(#icon)"/>
    <circle cx="20" cy="40" r="10" fill="none" stroke="url(#icon)" stroke-width="1.5" opacity="0.5"/>
    <!-- Right node -->
    <circle cx="60" cy="40" r="6" fill="url(#icon)"/>
    <circle cx="60" cy="40" r="10" fill="none" stroke="url(#icon)" stroke-width="1.5" opacity="0.5"/>
    <!-- Tunnel path -->
    <path d="M 26 40 C 33 20, 47 20, 54 40" fill="none" stroke="url(#purple)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 26 40 C 33 60, 47 60, 54 40" fill="none" stroke="url(#purple)" stroke-width="3" stroke-linecap="round"/>
    <!-- Cloudflare-style shield outline -->
    <path d="M 10 50 L 40 75 L 70 50 L 70 25 L 40 15 L 10 25 Z" fill="none" stroke="url(#icon)" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- ArgoX-Mini text -->
  <text x="95" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="800" fill="url(#purple)">ArgoX</text>
  <text x="225" y="52" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="32" font-weight="300" fill="url(#purple)">-Mini</text>

  <!-- Subtitle -->
  <text x="95" y="74" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" fill="#9CA3AF" letter-spacing="2">CLOUDFLARE ARGO TUNNEL MANAGER</text>

  <!-- Decorative dots -->
  <circle cx="88" cy="52" r="4" fill="#06B6D4" opacity="0.6"/>
</svg>
